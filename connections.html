<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FF6B35" />
  <title>Connections — Zenter</title>
  <meta name="description" content="Manage your centre mate connections on Zenter." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://zenter.in/connections.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
  <link href="/css/components.css" rel="stylesheet" />
  <link href="/css/dashboard.css" rel="stylesheet" />
  <link href="/css/responsive.css" rel="stylesheet" />

  <link rel="icon" href="/assets/logos/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div data-include="navbar"></div>

  <main class="hm-page" id="hm-main">
    <div class="hm-container">

      <header class="hm-feed-header">
        <div>
          <span class="hm-eyebrow">My network</span>
          <h1 style="margin-top: 12px;">Connections</h1>
          <p class="hm-text-muted">Centre mates you've connected with — and requests waiting on you.</p>
        </div>
        <div class="d-flex gap-2 flex-shrink-0">
          <a href="/dashboard.html" class="hm-btn hm-btn--primary hm-btn--sm">Find Mates</a>
        </div>
      </header>

      <!-- Content populated by connections.js -->
      <div id="hm-connections-root">
        <div class="hm-empty">
          <div class="hm-empty__icon" aria-hidden="true">🤝</div>
          <h3>No connections yet</h3>
          <p class="hm-text-muted" style="max-width:360px;margin:0 auto var(--hm-space-4);">
            Browse centre mates and send a request — phone numbers reveal only after both of you say yes.
          </p>
          <a href="/dashboard.html" class="hm-btn hm-btn--primary">Find centre mates</a>
        </div>
      </div>

    </div>
  </main>

  <div data-include="footer"></div>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/connections.js"></script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
