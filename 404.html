<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FF6B35" />
  <title>Page not found - Zenter</title>
  <meta name="description" content="The page you are looking for doesn't exist or has moved." />
  <meta name="robots" content="noindex, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
  <link href="/css/components.css" rel="stylesheet" />
  <link href="/css/responsive.css" rel="stylesheet" />

  <link rel="icon" href="/assets/logos/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div data-include="navbar"></div>

  <main class="hm-page" id="hm-main">
    <div class="hm-container" style="max-width:520px;">
      <div class="hm-card text-center" style="padding:var(--hm-space-7) var(--hm-space-6);">

        <div class="hm-empty__icon" aria-hidden="true"
             style="margin:0 auto var(--hm-space-4);width:72px;height:72px;font-size:36px;">🧭</div>

        <h1 style="margin:0 0 var(--hm-space-2);font-size:var(--hm-text-3xl);">Page not found</h1>

        <p class="hm-text-muted" style="max-width:380px;margin:0 auto var(--hm-space-5);">
          The page you're looking for doesn't exist or has moved.
          Let's get you back home.
        </p>

        <a href="/" class="hm-btn hm-btn--primary">← Back to home</a>

      </div>
    </div>
  </main>

  <div data-include="footer"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
